<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Sorry 🤍</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    body {
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 10px;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      position: relative;
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    .heart {
      font-size: 40px;
      color: white;
      animation: beat 1s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    #noBtn {
      position: absolute;
      transition: all 0.2s ease;
    }

    .yes-btn {
      padding: 6px 12px;
      font-size: 12px;
    }

    #typingText {
      min-height: 60px;
      font-size: 16px;
    }

    @media (max-width: 576px) {
      .card {
        padding: 20px !important;
      }

      h1 {
        font-size: 22px;
      }

      #typingText {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="card p-4 text-center">
    <div class="heart">🤍</div>

    <h1 class="mt-3">I'm Really Sorry, Sonu</h1>

    <p id="typingText" class="mt-3"></p>


    <div class="d-flex flex-column flex-sm-row justify-content-center gap-3 mt-3 position-relative" style="height:80px;">
      
      <button class="btn btn-success yes-btn" onclick="sayYes()">Yes 🤍</button>
      <button class="btn btn-danger" id="noBtn">No 😢</button>
    </div>

    <p id="response" class="mt-4 fw-bold"></p>
  </div>

  <script>
    const messages = [
      "Sonu, I didn’t mean to hurt you...",
      "I really felt bad for what happened 😔",
    ];

    let msgIndex = 0;
    let charIndex = 0;
    const typingElement = document.getElementById('typingText');

    function typeEffect() {
      if (charIndex < messages[msgIndex].length) {
        typingElement.innerHTML += messages[msgIndex].charAt(charIndex);
        charIndex++;
        setTimeout(typeEffect, 50);
      } else {
        setTimeout(() => {
          typingElement.innerHTML = "";
          charIndex = 0;
          msgIndex = (msgIndex + 1) % messages.length;
          typeEffect();
        }, 1500);
      }
    }

    typeEffect();

    const noBtn = document.getElementById('noBtn');

    function moveNoButton() {
      const container = document.querySelector('.d-flex');

      const maxX = container.clientWidth - noBtn.offsetWidth - 10;
      const maxY = container.clientHeight - noBtn.offsetHeight - 10;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    }

    noBtn.addEventListener('click', (e) => {
      e.preventDefault();
      moveNoButton();
    });

    noBtn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      moveNoButton();
    });

    function sayYes() {
      document.getElementById('response').innerText =
        "Thank you so much, Sonu 🤍🥹";

      confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
      });
    }
  </script>
</body>
</html>
