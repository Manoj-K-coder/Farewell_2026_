<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ðŸ¤</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0d0508;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
    font-family: 'Jost', sans-serif;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #fff;
    animation: twinkle ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.4); }
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    z-index: 0;
  }

  .orb1 { width: 320px; height: 320px; background: rgba(180,50,80,0.18); top: -80px; left: -80px; }
  .orb2 { width: 280px; height: 280px; background: rgba(120,30,60,0.15); bottom: -60px; right: -60px; }
  .orb3 { width: 180px; height: 180px; background: rgba(220,100,130,0.1); top: 40%; left: 50%; transform: translate(-50%, -50%); }

  .card-outer {
    position: relative;
    width: 100%;
    max-width: 420px;
    z-index: 10;
  }

  .card-glow {
    position: absolute;
    inset: -2px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(220,120,140,0.6) 0%, rgba(160,60,90,0.2) 40%, rgba(220,120,140,0.5) 100%);
    animation: glowPulse 3s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  .card {
    position: relative;
    z-index: 1;
    background: linear-gradient(160deg, #1c080f 0%, #140510 50%, #1c0810 100%);
    border-radius: 26px;
    border: 1px solid rgba(220,120,140,0.2);
    overflow: hidden;
    padding-bottom: 2rem;
  }

  .card-header-band {
    height: 3px;
    background: linear-gradient(90deg, transparent, #e8859a, #f0b0c0, #e8859a, transparent);
    background-size: 200%;
    animation: bandShimmer 4s linear infinite;
  }

  @keyframes bandShimmer {
    0% { background-position: 200%; }
    100% { background-position: -200%; }
  }

  .card-inner {
    padding: 2.5rem 2.5rem 0;
    text-align: center;
  }

  .heart-stage {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 1.5rem;
  }

  .heart-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(220,120,140,0.3);
    animation: ringPulse 2.5s ease-in-out infinite;
  }

  .heart-ring2 {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1px solid rgba(220,120,140,0.12);
    animation: ringPulse 2.5s ease-in-out 0.5s infinite;
  }

  @keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50% { transform: scale(1.08); opacity: 1; }
  }

  .heart-core {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(240,140,160,0.25), rgba(160,50,80,0.15));
    border: 1px solid rgba(220,120,140,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: heartBeat 1.8s ease-in-out infinite;
  }

  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    14% { transform: scale(1.13); }
    28% { transform: scale(1); }
    42% { transform: scale(1.08); }
    70% { transform: scale(1); }
  }

  .heart-svg { width: 38px; height: 38px; }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 600;
    color: #f5ccd5;
    letter-spacing: 0.04em;
    line-height: 1.2;
    margin-bottom: 6px;
  }

  .name-accent {
    color: #f0a0b5;
    font-style: italic;
  }

  .subtitle {
    font-size: 11px;
    font-weight: 200;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(220,150,170,0.5);
    margin-bottom: 2rem;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.75rem;
  }

  .orn-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(220,120,140,0.3), transparent);
  }

  .orn-diamond {
    width: 6px;
    height: 6px;
    background: rgba(220,120,140,0.5);
    transform: rotate(45deg);
  }

  #typingBox {
    min-height: 68px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    font-weight: 300;
    line-height: 1.8;
    color: rgba(245,205,215,0.8);
    margin-bottom: 1.5rem;
  }

  .cursor-blink {
    display: inline-block;
    width: 1.5px;
    height: 0.9em;
    background: #e8859a;
    margin-left: 1px;
    vertical-align: middle;
    animation: blink 0.9s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Button zone */
  .btn-area {
    position: relative;
    width: 100%;
    height: 120px;
  }

  .btn-yes {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #f5ccd5;
    background: linear-gradient(135deg, rgba(200,80,110,0.3), rgba(160,50,80,0.2));
    border: 1px solid rgba(220,120,140,0.55);
    border-radius: 50px;
    padding: 13px 36px;
    cursor: pointer;
    transition: border-color 0.3s, color 0.3s;
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  .btn-yes:hover {
    border-color: rgba(240,160,180,0.8);
    color: #fde0e8;
  }

  #noBtn {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(230, 170, 185, 0.85);
    background: rgba(160, 50, 80, 0.18);
    border: 1px solid rgba(220, 100, 130, 0.45);
    border-radius: 50px;
    padding: 12px 28px;
    cursor: pointer;
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
  }

  #noBtn:hover {
    background: rgba(160, 50, 80, 0.28);
    border-color: rgba(220, 100, 130, 0.65);
    color: rgba(250, 200, 210, 1);
  }

  #response {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: #f5ccd5;
    min-height: 28px;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.7s ease;
    padding: 0 2rem;
    text-align: center;
    margin-top: 0.5rem;
  }

  #response.show {
    opacity: 1;
    transform: translateY(0);
  }

  .card-footer {
    margin-top: 1.5rem;
    border-top: 1px solid rgba(220,120,140,0.08);
    padding: 1rem 2rem 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .footer-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(220,120,140,0.3);
  }

  .footer-text {
    font-size: 9px;
    font-weight: 200;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(180,100,120,0.3);
  }

  .particles-wrap {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .p-particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(230,130,155,0.4);
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { opacity: 0; transform: translateY(0) scale(0); }
    20% { opacity: 1; }
    80% { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
  }
</style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="stars" id="stars"></div>

  <div class="card-outer">
    <div class="card-glow"></div>
    <div class="card">
      <div class="card-header-band"></div>
      <div class="card-inner">

        <div class="heart-stage">
          <div class="heart-ring2"></div>
          <div class="heart-ring"></div>
          <div class="heart-core">
            <svg class="heart-svg" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M30 50 C30 50 8 36 8 21 C8 13 14 7 21.5 7 C25.5 7 29 9.5 30 12 C31 9.5 34.5 7 38.5 7 C46 7 52 13 52 21 C52 36 30 50 30 50Z" fill="rgba(220,100,130,0.35)" stroke="rgba(240,140,165,0.7)" stroke-width="1.2"/>
              <path d="M30 46 C30 46 12 34 12 21.5 C12 15.5 16.5 11 22 11 C25.5 11 28.5 13 30 15.5 C31.5 13 34.5 11 38 11 C43.5 11 48 15.5 48 21.5 C48 34 30 46 30 46Z" fill="rgba(230,120,145,0.2)" stroke="rgba(250,180,195,0.4)" stroke-width="0.7"/>
            </svg>
          </div>
          <div class="particles-wrap" id="pWrap"></div>
        </div>

        <h1 class="title">I'm Truly Sorry,<br><span class="name-accent">Dhanya</span></h1>
        <p class="subtitle">from the bottom of my heart</p>

        <div class="ornament">
          <div class="orn-line"></div>
          <div class="orn-diamond"></div>
          <div class="orn-diamond" style="opacity:0.5; transform:rotate(45deg) scale(0.65); margin:0 -3px;"></div>
          <div class="orn-diamond"></div>
          <div class="orn-line"></div>
        </div>

        <div id="typingBox"><span class="cursor-blink"></span></div>

        <div class="btn-area" id="btnArea">
          <button class="btn-yes" onclick="sayYes()">Accept </button>
          <button id="noBtn" onclick="moveNo()">Reject</button>
        </div>

      </div>

      <div id="response"></div>

      <div class="card-footer">
        <div class="footer-dot"></div>
        <span class="footer-text">with all my love</span>
        <div class="footer-dot"></div>
      </div>
    </div>
  </div>

  <script>
    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 55; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2 + 1;
      s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${-Math.random()*5}s`;
      starsEl.appendChild(s);
    }

    // Particles
    const pw = document.getElementById('pWrap');
    for (let i = 0; i < 8; i++) {
      const p = document.createElement('div');
      p.className = 'p-particle';
      const sz = Math.random() * 4 + 2;
      p.style.cssText = `width:${sz}px;height:${sz}px;left:${15+Math.random()*70}%;bottom:${5+Math.random()*15}%;animation-duration:${2.5+Math.random()*3}s;animation-delay:${-Math.random()*4}s`;
      pw.appendChild(p);
    }

    // Typing effect
    const msgs = [
      "I didn't mean to hurt you, Dhanya",
      "I felt terrible after what happened.",
      "Please let me make it right.",
      "I miss your smile more than words can say."
    ];
    let mi = 0, ci = 0;
    const tb = document.getElementById('typingBox');

    function type() {
      if (ci < msgs[mi].length) {
        tb.innerHTML = msgs[mi].substring(0, ci + 1) + '<span class="cursor-blink"></span>';
        ci++;
        setTimeout(type, 52);
      } else {
        setTimeout(() => {
          tb.innerHTML = '<span class="cursor-blink"></span>';
          ci = 0;
          mi = (mi + 1) % msgs.length;
          type();
        }, 2200);
      }
    }
    type();

    // Reject button â€” moves to a random spot, never overlaps Accept
    const nb  = document.getElementById('noBtn');
    const ba  = document.getElementById('btnArea');

    function moveNo() {
      const bw = ba.clientWidth;
      const bh = ba.clientHeight;
      const nw = nb.offsetWidth;
      const nh = nb.offsetHeight;

      const yesEl  = document.querySelector('.btn-yes');
      const baRect = ba.getBoundingClientRect();
      const yr     = yesEl.getBoundingClientRect();
      const yL = yr.left - baRect.left;
      const yT = yr.top  - baRect.top;
      const yR = yL + yr.width;
      const yB = yT + yr.height;

      let nx, ny, tries = 0;
      do {
        nx = Math.random() * Math.max(0, bw - nw);
        ny = Math.random() * Math.max(0, bh - nh);
        tries++;
        const overlaps = nx < yR + 10 && nx + nw > yL - 10 &&
                         ny < yB + 10 && ny + nh > yT - 10;
        if (!overlaps || tries > 40) break;
      } while (true);

      nb.style.transform = 'none';
      nb.style.left = nx + 'px';
      nb.style.top  = ny + 'px';
    }

    nb.addEventListener('touchstart', e => { e.preventDefault(); moveNo(); }, { passive: false });

    // Accept
    function sayYes() {
      const r = document.getElementById('response');
      r.innerText = "Thank you, Sonu ";
      r.classList.add('show');
      const colors = ['#e8859a','#f0b0c0','#fde0e8','#ffffff','#d4537e'];
      confetti({ particleCount: 200, spread: 90, origin: { y: 0.6 }, colors });
      setTimeout(() => confetti({ particleCount: 80, angle: 60,  spread: 55, origin: { x: 0, y: 0.7 }, colors }), 500);
      setTimeout(() => confetti({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1, y: 0.7 }, colors }), 700);
    }
  </script>

</body>
</html>
